name: Build and deploy web app

on:
  push:
    tags:
      - v*

  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        required: false
        default: false

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    env:
      PUBLISH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || inputs.publish }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        env:
          VITE_BASEPATH: /aria/
          VITE_APPLE_MUSIC_TOKEN_ENDPOINT: ${{ vars.VITE_APPLE_MUSIC_TOKEN_ENDPOINT }}
          VITE_DISCORD_CLIENT_ID: ${{ vars.VITE_DISCORD_CLIENT_ID }}
          VITE_LASTFM_API_KEY: ${{ vars.VITE_LASTFM_API_KEY }}
          VITE_LASTFM_API_SECRET: ${{ vars.VITE_LASTFM_API_SECRET }}
        run: bun run --filter aria-player build
      - name: Setup Pages
        if: env.PUBLISH == 'true'
        uses: actions/configure-pages@v4
      - name: Upload artifact
        if: env.PUBLISH == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist folder
          path: "./packages/aria-player/dist"
      - name: Deploy to GitHub Pages
        if: env.PUBLISH == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
